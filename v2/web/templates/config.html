{% extends "base.html" %}
{% block title %}Config{% endblock %}
{% block content %}
<h1 class="page">Config</h1>

<!-- Config editor. GUI parts tagged guiPart92–guiPart108 (see web/templates/GUIPARTS.md). -->
<!-- guiPart92 — config profile row (P8): shows the active editable-YAML set + a ＋ new
     button to create one (clones the current, then switches in to edit it). Switching
     *between* existing profiles is done from the header pill's popup (guiPart121/126).
     Every profile lives under yamls/<name>/ (the default profile is yamls/default/). -->
<div class="cfg-prof" data-guipart="92">
  <span class="cfg-prof-lbl">Profile</span>
  <b class="cfg-prof-cur" id="cfgProfCur">default</b>
  <button class="btn sm ghost" id="cfgProfNew" title="Create a new profile (clones the current one) and switch to it">＋ new</button>
  <span class="muted sm" id="cfgProfNote"></span>
</div>

<!-- guiPart93 — config layout (tree + editor) -->
<div class="help cfg" data-guipart="93">
  <!-- guiPart94 — config sidebar -->
  <aside class="help-side" data-guipart="94">
    <div class="side-head">
      <!-- guiPart95 — filter · guiPart96 — refresh tree -->
      <input type="text" id="cfgFilter" data-guipart="95" placeholder="filter files…" autocomplete="off">
      <button class="btn sm ghost" id="cfgRefresh" data-guipart="96" title="Reload the tree from disk">↻</button>
    </div>
    <!-- guiPart97 — config file tree; guiPart98 = a root dir, guiPart99 = a file (built in JS) -->
    <div class="tree" id="cfgTree" data-guipart="97"><div class="empty sm">loading…</div></div>
  </aside>

  <section class="help-doc cfg-edit">
    <!-- guiPart100 — editor header -->
    <div class="doc-head cfg-head" data-guipart="100">
      <!-- guiPart101 — file path · guiPart102 — kind chip · guiPart103 — dirty state -->
      <span class="doc-path mono" id="cfgPath" data-guipart="101">Select a file.</span>
      <span class="chip" id="cfgKind" data-guipart="102" style="display:none"></span>
      <span class="grow"></span>
      <span class="muted sm" id="cfgState" data-guipart="103"></span>
      <!-- guiPart104 — validate · guiPart105 — revert · guiPart106 — save -->
      <button class="btn sm ghost" id="cfgCheck" data-guipart="104" disabled>Check</button>
      <button class="btn sm warn ghost" id="cfgRevert" data-guipart="105" disabled title="Restore the newest backup">Revert</button>
      <button class="btn sm primary" id="cfgSave" data-guipart="106" disabled>Save</button>
    </div>
    <!-- guiPart107 — config text editor (line-number gutter + textarea) -->
    <div class="cfg-textwrap" data-guipart="107">
      <div class="cfg-gutter mono" id="cfgGutter" aria-hidden="true"></div>
      <textarea id="cfgText" class="cfg-text mono" spellcheck="false"
                placeholder="Pick a config file on the left to edit it." disabled></textarea>
    </div>
    <!-- guiPart108 — validation messages -->
    <div class="cfg-problems" id="cfgProblems" data-guipart="108"></div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const treeEl    = document.getElementById("cfgTree");
  const filterEl  = document.getElementById("cfgFilter");
  const textEl    = document.getElementById("cfgText");
  const gutterEl  = document.getElementById("cfgGutter");
  const pathEl    = document.getElementById("cfgPath");
  const kindEl    = document.getElementById("cfgKind");
  const stateEl   = document.getElementById("cfgState");
  const problems  = document.getElementById("cfgProblems");
  const btnCheck  = document.getElementById("cfgCheck");
  const btnSave   = document.getElementById("cfgSave");
  const btnRevert = document.getElementById("cfgRevert");
  const profCur   = document.getElementById("cfgProfCur");
  const profNote  = document.getElementById("cfgProfNote");
  const btnProfNew = document.getElementById("cfgProfNew");

  const fileLinks = {};        // "root/path" -> <a>
  let cur = null;              // {root, path, kind}
  let original = "";           // last-saved text (for dirty tracking)
  let curProfile = "default";  // the active config profile (the editable-YAML set)

  function key(root, path) { return root + "/" + path; }
  function dirty() { return cur && textEl.value !== original; }

  async function fetchJSON(url) {
    try {
      const r = await fetch(url, { headers: { "X-CCFlet-User": JSON.stringify(CCFlet.user) } });
      return await r.json();
    } catch (e) { return null; }
  }

  // ---- problems / status ----
  function clearProblems() { problems.className = "cfg-problems"; problems.textContent = ""; }
  function showOk(msg) {
    problems.className = "cfg-problems ok";
    problems.textContent = "✓ " + msg;
  }
  function showError(res) {
    problems.className = "cfg-problems err";
    let msg = res && res.error ? res.error : "invalid";
    if (res && res.line) msg = "line " + res.line + ": " + msg;
    problems.textContent = "✗ " + msg;
  }
  function refreshState() {
    btnSave.disabled = !cur || !dirty();
    btnCheck.disabled = !cur;
    stateEl.textContent = !cur ? "" : (dirty() ? "● unsaved changes" : "saved");
    stateEl.className = "muted sm" + (dirty() ? " unsaved" : "");
  }

  // ---- tree ----
  function renderTree(roots) {
    treeEl.innerHTML = "";
    Object.keys(fileLinks).forEach((k) => delete fileLinks[k]);
    (roots || []).forEach((root) => {
      const grp = document.createElement("div");
      grp.className = "tree-dir";
      const head = document.createElement("div");
      head.className = "tree-dir-head";
      const caret = document.createElement("span"); caret.className = "caret"; caret.textContent = "▾";
      const label = document.createElement("span"); label.textContent = root.label;
      const tag = document.createElement("span"); tag.className = "chip xs"; tag.textContent = root.key;
      head.append(caret, label, tag);
      head.addEventListener("click", () => grp.classList.toggle("collapsed"));
      const kids = document.createElement("div"); kids.className = "tree-kids";
      if (!root.files.length) {
        const e = document.createElement("div"); e.className = "empty sm"; e.textContent = "(no files)";
        kids.appendChild(e);
      }
      root.files.forEach((f) => {
        const a = document.createElement("a");
        a.className = "tree-file";
        a.href = "#";
        a.dataset.k = key(root.key, f.path);
        const t = document.createElement("span"); t.className = "tf-title"; t.textContent = f.name;
        a.appendChild(t);
        if (f.kind === "script") {
          const s = document.createElement("span"); s.className = "chip xs script"; s.textContent = "sh";
          a.appendChild(s);
        }
        a.addEventListener("click", (e) => { e.preventDefault(); openFile(root.key, f.path, f.kind); });
        fileLinks[a.dataset.k] = a;
        kids.appendChild(a);
      });
      grp.append(head, kids);
      treeEl.appendChild(grp);
    });
  }

  function setActive(k) {
    Object.values(fileLinks).forEach((a) => a.classList.remove("active"));
    if (fileLinks[k]) fileLinks[k].classList.add("active");
  }

  async function openFile(root, path, kind) {
    if (dirty() && !confirm("Discard unsaved changes?")) return;
    const doc = await fetchJSON("/api/config/file?root=" + encodeURIComponent(root) +
                                "&path=" + encodeURIComponent(path));
    if (!doc || doc.text === undefined) { showError({ error: "could not load file" }); return; }
    cur = { root: doc.root, path: doc.path, kind: doc.kind };
    original = doc.text;
    textEl.value = doc.text;
    textEl.disabled = false;
    updateGutter();
    pathEl.textContent = root + " / " + doc.path;
    kindEl.textContent = doc.kind;
    kindEl.style.display = "";
    btnRevert.disabled = !doc.has_backup;
    setActive(key(root, path));
    clearProblems();
    refreshState();
  }

  async function check() {
    if (!cur) return;
    const res = await CCFlet.api("/api/config/validate", "POST",
      { root: cur.root, path: cur.path, text: textEl.value });
    if (res && res.ok) showOk("valid — safe to save"); else showError(res);
  }

  async function save() {
    if (!cur || !dirty()) return;
    btnSave.disabled = true;
    const res = await CCFlet.api("/api/config/file", "POST",
      { root: cur.root, path: cur.path, text: textEl.value });
    if (res && res.ok) {
      original = textEl.value;
      btnRevert.disabled = false;
      showOk("saved" + (res.reloaded ? " · reloaded " + res.reloaded : ""));
      CCFlet.toast("saved " + cur.root + "/" + cur.path, "ok");
    } else {
      showError(res);
      CCFlet.toast("save blocked: " + ((res && res.error) || "invalid"), "err");
    }
    refreshState();
  }

  async function revert() {
    if (!cur) return;
    if (!confirm("Restore the newest backup of this file?")) return;
    const res = await CCFlet.api("/api/config/revert", "POST",
      { root: cur.root, path: cur.path });
    if (res && res.ok) {
      if (res.text !== undefined) { textEl.value = res.text; original = res.text; updateGutter(); }
      showOk("reverted to last backup" + (res.reloaded ? " · reloaded " + res.reloaded : ""));
      CCFlet.toast("reverted " + cur.root + "/" + cur.path, "ok");
    } else { showError(res); }
    refreshState();
  }

  // ---- config profiles (the editable-YAML set) ----
  // Each profile is a complete set of config roots; every profile lives under yamls/<name>/
  // (default = yamls/default/). This page shows the *active* profile + a ＋ new button to
  // clone one; switching *between* existing profiles is done from the header pill's popup
  // (guiPart121/126), which reloads the whole page on the new set (P8).
  function renderProfiles(profiles, active) {
    curProfile = active || "default";
    if (profCur) profCur.textContent = curProfile;
    profNote.textContent = curProfile === "default"
      ? "editing the default YAMLs (yamls/default/) · switch profile from the header pill"
      : "editing yamls/" + curProfile + " — other profiles are untouched · switch from the header pill";
  }

  // Make `name` the live profile and re-load the tree in place. Used only by ＋ new, to
  // hop straight into a freshly-cloned profile for editing (the popup handles the rest).
  async function switchProfile(name) {
    if (name === curProfile) return;
    if (dirty() && !confirm("Discard unsaved changes and switch profile?")) return;
    const res = await CCFlet.api("/api/config/profile", "POST", { name });
    if (res && res.ok) {
      curProfile = res.active || name;
      CCFlet.toast("config profile → " + curProfile, "ok");
      await init();                       // re-load the tree from the now-live profile
    } else {
      showError(res);
      CCFlet.toast("switch blocked: " + ((res && res.error) || "error"), "err");
    }
  }

  async function newProfile() {
    const name = (prompt("New profile name (letters, digits, - or _) — clones “" +
                         curProfile + "”:") || "").trim();
    if (!name) return;
    const res = await CCFlet.api("/api/config/profile/new", "POST",
      { name: name, from: curProfile });
    if (res && res.ok) {
      CCFlet.toast("created profile " + res.profile, "ok");
      await switchProfile(res.profile);   // hop straight into the new sandbox
    } else {
      CCFlet.toast("create blocked: " + ((res && res.error) || "error"), "err");
    }
  }

  if (btnProfNew) btnProfNew.addEventListener("click", newProfile);
  // another operator switched the live profile → re-sync this tab (and its tree).
  CCFlet.on("profile_changed", (d) => {
    if (!d || !d.active) return;
    renderProfiles(d.profiles, d.active);
    if (d.active !== curProfile) init();
  });

  // ---- editor behaviors ----
  // Render the line-number gutter from the current text and keep it scroll-synced.
  function updateGutter() {
    const lines = textEl.value.split("\n").length;
    let out = "";
    for (let i = 1; i <= lines; i++) out += i + "\n";
    gutterEl.textContent = out;
    gutterEl.scrollTop = textEl.scrollTop;
  }
  textEl.addEventListener("scroll", () => { gutterEl.scrollTop = textEl.scrollTop; });
  textEl.addEventListener("input", () => { clearProblems(); updateGutter(); refreshState(); });
  textEl.addEventListener("keydown", (e) => {
    if (e.key === "Tab") {                       // insert 2 spaces, don't tab away
      e.preventDefault();
      const s = textEl.selectionStart, end = textEl.selectionEnd;
      textEl.value = textEl.value.slice(0, s) + "  " + textEl.value.slice(end);
      textEl.selectionStart = textEl.selectionEnd = s + 2;
      updateGutter();
      refreshState();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); save(); }
  });
  btnCheck.addEventListener("click", check);
  btnSave.addEventListener("click", save);
  btnRevert.addEventListener("click", revert);

  filterEl.addEventListener("input", () => {
    const q = filterEl.value.trim().toLowerCase();
    Object.values(fileLinks).forEach((a) => {
      a.style.display = (!q || a.dataset.k.toLowerCase().includes(q)) ? "" : "none";
    });
  });

  window.addEventListener("beforeunload", (e) => {
    if (dirty()) { e.preventDefault(); e.returnValue = ""; }
  });

  async function init() {
    const data = await fetchJSON("/api/config/tree");
    if (!data || !data.roots) { treeEl.innerHTML = '<div class="empty sm">No config roots.</div>'; return; }
    renderProfiles(data.profiles, data.active);
    renderTree(data.roots);
    // open the first file (usually fleet.yaml)
    for (const r of data.roots) if (r.files.length) { openFile(r.key, r.files[0].path, r.files[0].kind); break; }
  }
  document.getElementById("cfgRefresh").addEventListener("click", init);
  init();
})();
</script>
{% endblock %}
