# domain/sequences.yaml — variant-aware ordered sequences (the engine reads + runs these)
#
# The orchestrator reads these step lists and runs them **in the listed order**;
# the ordering invariants below are enforced generically (core/sequences.py::validate)
# so the operator-pinned order is guaranteed — e.g. serviceA before serviceB, and
# serviceC before serviceA in variant B. Regenerated by the Compiler from a
# `system/layer3.subparts/sequence-*.yaml`; this is the default ccFleet demo shape.

deploy:
  # rsync the payloads, then optionally build serviceA on the node
  steps:
    - { role: roleA, action: deploy_serviceB }
    - { role: roleA, action: deploy_serviceA }
  build_steps:
    - { role: roleA, action: serviceA_build }

bring_up:
  # each step = role + a start action + a status action; the engine waits for the
  # daemon to report healthy (status) before moving to the next step.
  variants:
    A:
      - { role: roleA, start: serviceA_start, status: serviceA_status }
      - { role: roleA, start: serviceB_start, status: serviceB_status }
    B:
      - { role: roleB, start: serviceC_start, status: serviceC_status }
      - { role: roleA, start: serviceA_start, status: serviceA_status }
      - { role: roleA, start: serviceB_start, status: serviceB_status }

tear_down:
  # stop in reverse dependency order; no health wait between stops.
  variants:
    A:
      - { role: roleA, action: serviceB_stop }
      - { role: roleA, action: serviceA_stop }
    B:
      - { role: roleA, action: serviceB_stop }
      - { role: roleA, action: serviceA_stop }
      - { role: roleB, action: serviceC_stop }

# Ordering invariants enforced generically: for each variant the listed actions
# (those that appear in the sequence) must occur in this relative order, or the
# orchestrator refuses to start (fail fast, never run a mis-ordered bring-up).
invariants:
  bring_up:
    A: [serviceA_start, serviceB_start]
    B: [serviceC_start, serviceA_start, serviceB_start]
  tear_down:
    A: [serviceB_stop, serviceA_stop]
    B: [serviceB_stop, serviceA_stop, serviceC_stop]
